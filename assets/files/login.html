<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="icon" type="image/x-icon" href="../../favicon.ico">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="../../index.html">INICIO</a></li>
                <li><a href="">QUIENES SOMOS</a></li>
                <li><a href="">COMO COMPRAR</a></li>
                <li><a href="../files/catalogo.html">CATALOGO</a></li>
                <li><a href="">CONTACTO</a></li>
                <li id="iniciarSesion" class=""><a href="./login.html">INICIAR SESION</a></li>
                <li><button id="cerrarSesion" class="invisible">CERRAR SESION</button></li>
            </ul>
        </nav>
    </header>
    <main>
        <form id="formularioLogin">
            <fieldset class="datos">
                <legend>Iniciar Sesion</legend>
                <p class="mensajeError" id="mensajeErrorLoginGeneral"></p>
                <div class="contenedorLogin">
                    <label>Usuario: </label>
                    <input id="usuarioLogin" type="text" placeholder="Juanito123">
                    <p class="mensajeError" id="mensajeErrorLoginUsuario"></p>
                </div>
                <div class="contenedorLogin">
                    <label>Contraseña: </label>
                    <input id="contrasenaLogin" type="password" placeholder="************">
                    <p class="mensajeError" id="mensajeErrorLoginContrasena"></p>
                </div>
                
                <button class="botonSubmit" id="btnLogin" type="button">Login</button>
                <p><strong>No tienes cuenta?</strong></p>
                <button type="button" id="btnCambioRegistrar">Registrarse</button>
            </fieldset>
        </form>
        
        <form id="formularioRegistrarse" class="invisible">
            <fieldset class="datos">
                <legend>Registrarse</legend>
                <p class="mensajeError" id="mensajeErrorRegistroGeneral"></p>
                <div class="contenedorRegistrarse">
                    <label>Usuario: </label>
                    <input id="usuarioRegistro" type="text" placeholder="Juanito123">
                    <p class="mensajeError" id="mensajeErrorRegistroUsuario"></p>
                </div>
                <div class="contenedorRegistrarse">
                    <label>Contraseña: </label>
                    <input id="contrasenaRegistro" type="password" placeholder="************">
                    <p class="mensajeError" id="mensajeErrorRegistroContrasena"></p>
                </div>
                <div class="contenedorRegistrarse">
                    <label>Repetir Contraseña: </label>
                    <input id="repetirContrasenaRegistro" type="password" placeholder="************">
                    <p class="mensajeError" id="mensajeErrorRegistroRepetirContrasena"></p>
                </div>
                <div class="contenedorRegistrarse">
                    <label>Email: </label>
                    <input id="emailRegistro" type="email" placeholder="Ejemplo@email.com">
                </div>
                <button class="botonSubmit" type="button" id="btnRegistrarse">Registrarse</button>
                <p><strong>Ya tienes cuenta?</strong></p>
                <button type="button" id="btnCambioLogin">Login</button>
            </fieldset>
        </form>
        <div id="cartelBienvenida" class="invisible">
            <p class="cartel" id="textoCartel"></p>
        </div>
        <script src="../js/login.js"></script>
    </main>

    <footer></footer>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="icon" type="image/x-icon" href="../../favicon.ico">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="../../index.html">INICIO</a></li>
                <li><a href="">QUIENES SOMOS</a></li>
                <li><a href="">COMO COMPRAR</a></li>
                <li><a href="../files/catalogo.html">CATALOGO</a></li>
                <li><a href="">CONTACTO</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <form id="formularioLogin">
            <fieldset class="datos">
                <legend>Iniciar Sesion</legend>
                
                <div class="contenedorLogin">
                    <label>Usuario: </label>
                    <input type="text" placeholder="Juanito123">
                </div>
                <div class="contenedorLogin">
                    <label>Contraseña: </label>
                    <input type="password" placeholder="************">
                </div>
                <button class="botonSubmit" id="btnLogin">Login</button>
                <p><strong>No tienes cuenta?</strong></p>
                <button type="button" id="btnCambioRegistrar">Registrarse</button>
            </fieldset>
        </form>
        
        <form id="formularioRegistrarse" class="invisible">
            <fieldset class="datos">
                <legend>Registrarse</legend>
                <div class="contenedorRegistrarse">
                    <label>Usuario: </label>
                    <input type="text" placeholder="Juanito123">
                </div>
                <div class="contenedorRegistrarse">
                    <label>Contraseña: </label>
                    <input type="password" placeholder="************">
                </div>
                <div class="contenedorRegistrarse">
                    <label>Repetir Contraseña: </label>
                    <input type="password" placeholder="************">
                </div>
                <div class="contenedorRegistrarse">
                    <label>Email: </label>
                    <input type="ema" placeholder="Ejemplo@email.com">
                </div>
                <button class="botonSubmit" id="brnRegistrarse">Registrarse</button>
                <p><strong>Ya tienes cuenta?</strong></p>
                <button type="button" id="btnCambioLogin">Login</button>
            </fieldset>
        </form>
        <script src="../js/login.js"></script>
    </main>

    <footer></footer>
</body>

</html>
